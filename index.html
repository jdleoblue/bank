<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JD's Bank</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(125, 142, 74, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(128, 69, 255, 0.12), transparent 30%),
        #f7f7f5;
      overflow: hidden;
      padding: 20px;
    }

    .app {
      width: 390px;
      height: 844px;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.48);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow:
        0 40px 80px rgba(0,0,0,0.12),
        inset 0 1px 1px rgba(255,255,255,0.7);
    }

    .content {
      padding: 28px;
      height: 100%;
      overflow-y: auto;
      position: relative;
    }

    .top-spacing {
      height: 12px;
    }

    .logo-area {
      text-align: center;
      position: relative;
      margin-bottom: 40px;
    }

    .logo-mark {
      font-family: Georgia, serif;
      font-size: 52px;
      line-height: 1;
      letter-spacing: -8px;
    }

    .logo-mark span:first-child {
      color: #6d7d3f;
    }

    .logo-mark span:last-child {
      color: #8b3dff;
    }

    .logo-text {
      font-family: Georgia, serif;
      font-size: 22px;
      margin-top: -4px;
      color: #111827;
    }

    .profile {
      position: absolute;
      top: 0;
      right: 0;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -1.8px;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 40px;
    }

    .section-label {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .balance {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .balance h2 {
      font-size: 64px;
      line-height: 1;
      letter-spacing: -4px;
      color: #020617;
    }

    .eye {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #111827;
    }

    .growth {
      color: #6d7d3f;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 46px;
    }

    .accounts-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 22px;
      color: #111827;
    }

    .card {
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 34px;
      padding: 26px;
      margin-bottom: 24px;
      box-shadow:
        0 10px 40px rgba(0,0,0,0.05),
        inset 0 1px 1px rgba(255,255,255,0.8);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .left {
      display: flex;
      gap: 18px;
    }

    .icon {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: rgba(109,125,63,0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #6d7d3f;
      font-size: 26px;
    }

    .account-name {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .account-number {
      color: #6b7280;
      font-size: 16px;
    }

    .amount {
      text-align: right;
    }

    .amount strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
      color: #020617;
    }

    .amount span {
      color: #6d7d3f;
      font-size: 14px;
      font-weight: 600;
    }

    .chart {
      height: 62px;
      border-radius: 999px;
      background:
        linear-gradient(to bottom, transparent, rgba(109,125,63,0.08)),
        url("data:image/svg+xml,%3Csvg width='320' height='60' viewBox='0 0 320 60' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 40C30 35 55 36 80 25C100 18 125 32 150 28C180 23 210 10 240 16C270 22 290 15 320 8' stroke='%236d7d3f' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }

    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 135px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-top: 1px solid rgba(255,255,255,0.7);
      border-radius: 36px 36px 0 0;
    }

    .voice-button {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 12px 35px rgba(139,61,255,0.22),
        inset 0 1px 1px rgba(255,255,255,0.8);
      cursor: pointer;
      z-index: 100;
    }

    .voice-button::before {
      content: "🎙";
      font-size: 40px;
      color: #8b3dff;
    }

    .voice-button:hover {
      transform: translateX(-50%) scale(1.04);
    }

    .up-arrow {
      position: absolute;
      bottom: 128px;
      left: 50%;
      transform: translateX(-50%);
      color: #9ca3af;
      font-size: 26px;
    }

    @media (max-width: 500px) {
      body {
        padding: 0;
      }

      .app {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <div class="content">

      <div class="top-spacing"></div>

      <div class="logo-area">

        <div class="logo-mark">
          <span>J</span><span>D</span>
        </div>

        <div class="logo-text">
          JD’s Bank
        </div>

        <div class="profile">
          <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400&auto=format&fit=crop" />
        </div>

      </div>

      <h1>Good morning, Alex</h1>

      <div class="subtitle">
        Here’s what’s happening with your money.
      </div>

      <div class="section-label">
        Total Balance
      </div>

      <div class="balance">
        <h2>$4,562.38</h2>
        <div class="eye"></div>
      </div>

      <div class="growth">
        ↑ $236.50 (5.47%) from last month
      </div>

      <div class="accounts-title">
        Accounts
      </div>

      <div class="card">

        <div class="card-top">

          <div class="left">

            <div class="icon">▣</div>

            <div>
              <div class="account-name">Checking</div>
              <div class="account-number">•••• 1234</div>
            </div>

          </div>

          <div class="amount">
            <strong>$3,256.78</strong>
            <span>Available balance</span>
          </div>

        </div>

        <div class="chart"></div>

      </div>

      <div class="card">

        <div class="card-top">

          <div class="left">

            <div class="icon">♧</div>

            <div>
              <div class="account-name">Savings</div>
              <div class="account-number">•••• 5678</div>
            </div>

          </div>

          <div class="amount">
            <strong>$1,305.60</strong>
            <span>Available balance</span>
          </div>

        </div>

        <div class="chart"></div>

      </div>

    </div>

    <div class="up-arrow">⌃</div>

    <button class="voice-button"></button>

    <div class="bottom-panel"></div>

  </div>

</body>
</html>
